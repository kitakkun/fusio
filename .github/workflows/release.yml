name: Release

# Fires when a tag matching `v*` is pushed (e.g., `v0.1.0`, `v1.2.3`). The tag
# name minus its `v` prefix becomes the published version, so creating a Git
# tag is literally the release trigger — no extra click on GitHub Releases
# needed. Snapshots (`v0.1.0-SNAPSHOT` style) route to Sonatype's snapshot repo
# via the release/snapshot URL toggle already in fusio.publish.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Sonatype
    # macOS runner so Apple klib targets (iosArm64, iosSimulatorArm64,
    # macosArm64) build. See the `library` job in ci.yml for the same choice.
    runs-on: macos-latest
    # Sonatype + signing credentials live in the Release environment, so the
    # GitHub Actions runtime only injects them once the deployment to Release
    # has been approved. Required-reviewer rules on the environment can gate
    # publishing if needed.
    environment: Release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Read-only so a release run can't accidentally overwrite main's
          # cache entries with anything tag-specific.
          cache-read-only: true

      # Same Konan cache as ci.yml. The cache key pins the toolchain to the
      # exact Kotlin version in `gradle/libs.versions.toml`, and GitHub
      # Actions cache is scoped to this repo — anyone who could poison it
      # could also push to main, so the trust boundary is the same as the
      # source code itself. Fresh-downloading on every release would just
      # re-fetch the same bytes JetBrains served to main's CI run.
      - name: Cache Konan (Kotlin/Native toolchain + platform libs)
        uses: actions/cache/restore@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Extract version from tag
        id: version
        # refs/tags/v1.2.3  ->  1.2.3
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Go through the same `build` lane CI runs on every PR — no point
      # publishing a release that fails its own test suite. Keeps the signed
      # upload gated on apiCheck / verifyComposeMetrics / IR snapshot etc.
      - name: Build + verify
        run: ./gradlew build -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: Publish
        env:
          # Central Portal "User Token" — generated at
          # central.sonatype.com → Account → User Tokens. The vanniktech
          # plugin reads these as gradle properties.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        # Builds, signs, uploads. Deployment then sits in Central Portal's
        # "Validated" state — the operator publishes it from the web UI.
        run: |
          ./gradlew publishToMavenCentral \
            -PVERSION_NAME=${{ steps.version.outputs.version }}
