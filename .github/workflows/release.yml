name: Release

# Fires when a tag matching `v*` is pushed (e.g., `v0.1.0`, `v1.2.3`). The tag
# name minus its `v` prefix becomes the published version, so creating a Git
# tag is literally the release trigger — no extra click on GitHub Releases
# needed. Snapshots (`v0.1.0-SNAPSHOT` style) route to Sonatype's snapshot repo
# via the release/snapshot URL toggle already in fusio.publish.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Sonatype
    # macOS runner so Apple klib targets (iosArm64, iosSimulatorArm64,
    # macosArm64) build. See the `library` job in ci.yml for the same choice.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Releases are infrequent and reuse main's already-warmed Gradle
          # cache. Read-only so a release run can't accidentally overwrite
          # main-branch cache entries with anything tag-specific.
          #
          # Note: only the Gradle dependency cache (`~/.gradle/caches/`) is
          # restored here — checksums on every Maven artifact mean a poisoned
          # entry would fail verification. The Kotlin/Native toolchain in
          # `~/.konan/` is *deliberately not cached* in this workflow; see
          # the comment below for the rationale.
          cache-read-only: true

      # Konan (Kotlin/Native compiler + platform libs) is intentionally
      # downloaded fresh on every release. It's the binary that compiles the
      # release artifacts; reusing a cached toolchain would mean trusting
      # whatever bits happen to be in `~/.konan/` from the most recent main
      # CI run. Maven Central artifacts are immutable once published, so
      # we'd rather pay the 3-5 minute fresh-download cost than carry any
      # risk of a stale or corrupted toolchain into a release we can't take
      # back. ci.yml caches Konan because the trade-off there (cost vs.
      # reproducibility-of-throwaway-PR-builds) tips the other way.

      - name: Extract version from tag
        id: version
        # refs/tags/v1.2.3  ->  1.2.3
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Go through the same `build` lane CI runs on every PR — no point
      # publishing a release that fails its own test suite. Keeps the signed
      # upload gated on apiCheck / verifyComposeMetrics / IR snapshot etc.
      - name: Build + verify
        run: ./gradlew build -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: Publish
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew publishAllPublicationsToSonatypeRepository \
            -PVERSION_NAME=${{ steps.version.outputs.version }}
