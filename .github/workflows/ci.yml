name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build library modules
        run: ./gradlew build

      - name: Run runtime unit tests
        run: ./gradlew :aria-runtime:jvmTest

      - name: Run compiler-plugin diagnostic tests
        run: ./gradlew :aria-compiler-plugin:test

      - name: Smoke-test sample (composite build)
        working-directory: sample
        run: ../gradlew runJvm

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
