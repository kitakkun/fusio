name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Only one CI run per branch at a time; superseded runs get cancelled so a
# rapid-fire push doesn't pile up workers.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  library:
    name: Library build + tests
    # macos-latest covers every KMP target we declare: JVM, JS, WasmJs, and the
    # Apple native targets (iosArm64, iosSimulatorArm64, macosArm64). The Apple
    # ones need the Xcode toolchain, which isn't available on Linux runners —
    # `./gradlew build` on ubuntu would fail at compileKotlinIosArm64. One
    # macOS runner is simpler than splitting into linux + apple jobs.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Cache downloaded deps, wrapper distribution, local build cache, and
          # the configuration cache store under ~/.gradle/.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # `~/.konan/` holds the Kotlin/Native toolchain (~1-2 GB) and the
      # cinterop platform libraries the iosArm64 / iosSimulatorArm64 /
      # macosArm64 targets compile against. setup-gradle caches `~/.gradle/`
      # but not `~/.konan/`, so without this step every CI run re-downloads
      # the native toolchain — adding ~3-5 minutes to a cold build.
      #
      # Key on the version files that pin Kotlin and Gradle: when either
      # bumps, the cache invalidates and we pay one re-download instead of
      # carrying stale toolchain forward. PRs and release tags fall back to
      # the most recent main-branch cache via the prefix restore-keys.
      - name: Cache Konan (Kotlin/Native toolchain + platform libs)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      # `build` runs assemble + check on every module, and check pulls in test.
      # That exercises:
      #   - :fusio-runtime:allTests (commonTest on 7 KMP variants)
      #   - :fusio-test:allTests (presenter test harness self-tests, 7 variants)
      #   - :fusio-compiler-plugin-tests:{k230,k2310,tests-k2320,k2321,
      #     tests-k240_beta2}:test (per-Kotlin-patch diagnostics + box via the
      #     internal test framework; the k2321 / k240_beta2 lanes also cover IR)
      #   - :fusio-compiler-plugin:smokeK24 (shaded plugin loaded as -Xplugin
      #     into a forked 2.4.0-Beta2 compiler)
      #   - :demo:jvmTest (TaskList / Filter / MyScreen presenter tests)
      # Splitting into separate gradle invocations buys nothing because Gradle
      # task graph would re-run the same work.
      - name: Build and test libraries
        run: ./gradlew build --parallel

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: library-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

# demo is now a subproject of the root, not a composite build. It's
# exercised automatically by the `library` job's `./gradlew build`, so
# there's no separate CI job for it.
